name: Build & Push Images

on:
  push:
    branches: [main]
    tags: ["v*.*.*"]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "apps/proxy/**"
      - "apps/builder/**"
      - "deploy/**"
      - "packages/db/**"
      - "go.work"
      - "go.work.sum"
      - "get.sh"
      - "apps/cli/**"
      - "VERSION"
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  ORG: meshploy
  DEPLOY_DIR: /opt/meshploy

jobs:
  # ── Detect changed paths ──────────────────────────────────────────────────────
  changes:
    runs-on: ubuntu-latest
    outputs:
      api:     ${{ steps.filter.outputs.api }}
      web:     ${{ steps.filter.outputs.web }}
      proxy:   ${{ steps.filter.outputs.proxy }}
      builder: ${{ steps.filter.outputs.builder }}
      caddy:   ${{ steps.filter.outputs.caddy }}
      deploy:  ${{ steps.filter.outputs.deploy }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - "apps/api/**"
              - "packages/db/**"
              - "go.work"
              - "go.work.sum"

            web:
              - "apps/web/**"

            proxy:
              - "apps/proxy/**"
              - "packages/db/**"
              - "go.work"
              - "go.work.sum"

            builder:
              - "apps/builder/**"

            caddy:
              - "deploy/caddy/**"

            deploy:
              - "deploy/**"


  # ── API ───────────────────────────────────────────────────────────────────────
  api:
    needs: changes
    if: needs.changes.outputs.api == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: API
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/api
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'release-please') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Read version
        id: ver
        run: echo "value=$(cat VERSION)" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: VERSION=${{ steps.ver.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Web ───────────────────────────────────────────────────────────────────────
  web:
    needs: changes
    if: needs.changes.outputs.web == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: Web
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/web
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'release-please') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/web
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Caddy (custom build with meshploy DNS provider) ──────────────────────────
  caddy:
    needs: changes
    if: needs.changes.outputs.caddy == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: Caddy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/caddy
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'release-please') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: deploy/caddy
          file: deploy/caddy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Proxy ────────────────────────────────────────────────────────────────────
  proxy:
    needs: changes
    if: needs.changes.outputs.proxy == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: Proxy
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/proxy
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'release-please') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/proxy/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Deploy ────────────────────────────────────────────────────────────────────
  # Runs after all build jobs (whether they ran or were skipped).
  # Syncs deploy/ configs to the server, pulls new images, restarts containers.
  deploy:
    needs: [api, web, caddy, proxy, builder, changes]
    if: |
      always() && !failure() && !cancelled() &&
      (
        needs.changes.outputs.api     == 'true' ||
        needs.changes.outputs.web     == 'true' ||
        needs.changes.outputs.proxy   == 'true' ||
        needs.changes.outputs.caddy   == 'true' ||
        needs.changes.outputs.deploy  == 'true' ||
        github.event_name             == 'workflow_dispatch'
      )
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      # Sync deploy/ folder to server, preserving runtime-substituted files.
      # .rsyncignore defines what to protect (zone files, Corefile, .env, etc.)
      - name: Sync deploy configs
        run: |
          rsync -az --delete \
            --exclude-from='deploy/.rsyncignore' \
            deploy/ \
            ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }}:${{ env.DEPLOY_DIR }}/

      # Pull new images and restart only changed services.
      - name: Pull and restart
        run: |
          ssh ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} \
            "cd ${{ env.DEPLOY_DIR }} && \
             RUNTIME=\$(grep '^CONTAINER_RUNTIME=' .env 2>/dev/null | cut -d= -f2 | grep -m1 . || echo docker) && \
             \${RUNTIME} compose pull --quiet && \
             \${RUNTIME} compose up -d --remove-orphans"

  # ── Builder ───────────────────────────────────────────────────────────────────
  builder:
    needs: changes
    if: needs.changes.outputs.builder == 'true' || github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
    name: Builder
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.ORG }}/builder
          tags: |
            type=sha,prefix=,format=short
            type=raw,value=main,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') || contains(github.event.head_commit.message, 'release-please') }}
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: apps/builder
          file: apps/builder/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
