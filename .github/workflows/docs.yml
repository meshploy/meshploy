name: Docs

on:
  push:
    branches: [main]
    paths:
      - "apps/docs/**"
      - "README.md"
      - "HOW_IT_WORKS.md"
      - "CONCEPTS.md"
      - "CONTRIBUTING.md"
      - "SECURITY.md"
      - "TODO.md"
      - "packages/db/README.md"
      - "apps/cli/README.md"
      - "apps/api/README.md"
      - "apps/web/public/**"
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: apps/docs/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: apps/docs

      - name: Build
        run: npm run build
        working-directory: apps/docs

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DOCS_DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DOCS_DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy
        run: |
          rsync -az --delete \
            apps/docs/dist/ \
            ${{ secrets.DOCS_DEPLOY_USER }}@${{ secrets.DOCS_DEPLOY_HOST }}:${{ secrets.DOCS_DEPLOY_PATH }}/
