services:

  # ── Database ───────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${POSTGRES_DB:-meshploy}
      POSTGRES_USER:     ${POSTGRES_USER:-meshploy}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-meshploy}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ── Headscale — WireGuard mesh control plane ───────────────────────────────
  # Listens on localhost only; Caddy proxies headscale.{DOMAIN} → 8085
  headscale:
    image: headscale/headscale:0.28.0
    restart: unless-stopped
    command: serve
    ports:
      - "127.0.0.1:8085:8080"
      - "127.0.0.1:9090:9090"   # Prometheus metrics, localhost only
    volumes:
      - ./headscale/config:/etc/headscale:z
      - ./headscale/data:/var/lib/headscale:z

  # ── CoreDNS — authoritative DNS ────────────────────────────────────────────
  # network_mode: host required to bind to specific public + mesh IPs.
  # Handles: public zone, internal mesh zone, ACME challenge delegation.
  coredns:
    image: coredns/coredns:latest
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./coredns/Corefile:/etc/coredns/Corefile:ro,z
      - ./coredns/zones:/etc/coredns/zones:z
    command: -conf /etc/coredns/Corefile

  # ── Caddy — TLS termination + reverse proxy ────────────────────────────────
  # network_mode: host so it binds 80/443 on the public IP directly.
  # Auto-provisions TLS for named subdomains via HTTP-01 ACME.
  caddy:
    image: ghcr.io/meshploy/caddy:latest
    restart: unless-stopped
    network_mode: host
    environment:
      DOMAIN:           ${DOMAIN}
      MESH_IP:          ${MESH_IP:-100.64.0.1}
      PUBLIC_IP:        ${PUBLIC_IP}
      GATEWAY_HOSTNAME: ${GATEWAY_HOSTNAME}
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro,z
      - ./coredns/zones:/etc/coredns/zones:z  # shared with CoreDNS for ACME TXT records
      - caddy_data:/data
      - caddy_config:/config

  # ── Built-in container registry ───────────────────────────────────────────
  # Self-hosted Docker Registry v2, accessible from all mesh nodes via the
  # gateway WireGuard IP (MESH_IP:5000). Build jobs push here; K3s nodes pull.
  # Insecure HTTP — traffic stays within the WireGuard mesh (trusted network).
  registry:
    image: registry:2
    restart: unless-stopped
    ports:
      - "5000:5000"   # bind all interfaces so mesh nodes can reach it
    environment:
      REGISTRY_STORAGE_FILESYSTEM_ROOTDIRECTORY: /var/lib/registry
    volumes:
      - registry_data:/var/lib/registry

  # ── Meshploy API ───────────────────────────────────────────────────────────
  # Port 4000 binds on all interfaces so worker nodes can reach the API over the
  # WireGuard mesh (100.64.0.1:4000). External traffic goes through Caddy on 443;
  # the API is JWT-authenticated so direct access on 4000 is safe.
  api:
    image: ghcr.io/meshploy/api:latest
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL:      postgres://${POSTGRES_USER:-meshploy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meshploy}?sslmode=disable
      JWT_SECRET:        ${JWT_SECRET}
      ENCRYPTION_KEY:    ${ENCRYPTION_KEY}
      API_BASE_URL:      ${API_BASE_URL:-https://api.${DOMAIN}}
      FRONTEND_URL:      ${FRONTEND_URL:-https://app.${DOMAIN}}
      HEADSCALE_URL:     http://headscale:8080
      HEADSCALE_API_KEY: ${HEADSCALE_API_KEY}
      KUBECONFIG:        /etc/rancher/k3s/k3s.yaml
      K3S_SERVER_URL:    https://host.meshploy.internal:6443
      K3S_TOKEN:                  ${K3S_TOKEN}
      API_PORT:                   4000
      DOMAIN:                     ${DOMAIN}
      MESH_IP:                    ${MESH_IP:-100.64.0.1}
      GATEWAY_HOSTNAME:           ${GATEWAY_HOSTNAME}
      BUILTIN_REGISTRY_ENDPOINT:  ${MESH_IP:-100.64.0.1}:5000
    extra_hosts:
      - "host.meshploy.internal:${HOST_GATEWAY_IP}"
    volumes:
      - /etc/rancher/k3s/k3s.yaml:/etc/rancher/k3s/k3s.yaml:ro
      - /opt/meshploy/install.sh:/opt/meshploy/install.sh:ro
      - /opt/meshploy/uninstall.sh:/opt/meshploy/uninstall.sh:ro
      - /var/lib/rancher/k3s/server/node-token:/var/lib/rancher/k3s/server/node-token:ro
    depends_on:
      postgres:
        condition: service_healthy
      headscale:
        condition: service_started
      registry:
        condition: service_started

  # ── Meshploy Web UI ────────────────────────────────────────────────────────
  web:
    image: ghcr.io/meshploy/web:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:5173:80"
    depends_on:
      - api

  # ── Meshploy Traffic Proxy ─────────────────────────────────────────────────
  # Resolves *.{DOMAIN} and *.internal.{DOMAIN} routes via DB → mesh IP + port.
  # Receives wildcard traffic from Caddy.
  proxy:
    image: ghcr.io/meshploy/proxy:latest
    restart: unless-stopped
    ports:
      - "127.0.0.1:8081:8081"
    environment:
      DATABASE_URL:   postgres://${POSTGRES_USER:-meshploy}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-meshploy}?sslmode=disable
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      PROXY_PORT:     8081
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  registry_data:
  caddy_data:
    external: true
    name: meshploy_caddy_data
  caddy_config:
    external: true
    name: meshploy_caddy_config
