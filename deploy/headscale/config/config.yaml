# Headscale configuration for Meshploy
# Replace all ${DOMAIN} placeholders with your actual domain before starting.
# install.sh substitutes these automatically via envsubst.

# Public URL Tailscale/Headscale clients connect to — must be HTTPS on 443
server_url: https://headscale.${DOMAIN}

# Headscale listens on this address inside the container.
# Caddy proxies headscale.${DOMAIN}:443 → localhost:8085 → container:8080
listen_addr: 0.0.0.0:8080
metrics_listen_addr: 127.0.0.1:9090

# Key files — auto-generated on first start
private_key_path: /var/lib/headscale/private.key
noise:
  private_key_path: /var/lib/headscale/noise_private.key

# IP address ranges assigned to mesh nodes
prefixes:
  v4: 100.64.0.0/10
  v6: fd7a:115c:a1e0::/48
  allocation: sequential

# TLS handled by Caddy — leave empty
tls_cert_path: ""
tls_key_path: ""

# DERP relay — use Tailscale's public servers
derp:
  server:
    enabled: false
    region_id: 999
    region_code: "headscale"
    region_name: "Headscale Embedded DERP"
    stun_listen_addr: "0.0.0.0:3478"
  urls:
    - https://controlplane.tailscale.com/derpmap/default
  auto_update_enabled: true
  update_frequency: 24h

# Database — SQLite, stored in the mounted data volume
database:
  type: sqlite
  sqlite:
    path: /var/lib/headscale/db.sqlite

# DNS — mesh nodes use CoreDNS at the gateway's WireGuard IP
dns:
  magic_dns: true
  base_domain: mesh.${DOMAIN}
  nameservers:
    global:
      - 1.1.1.1
      - 1.0.0.1
    split:
      "internal.${DOMAIN}":
        - 100.64.0.1
  search_domains:
    - internal.${DOMAIN}

log:
  format: text
  level: info

ephemeral_node_inactivity_timeout: 30m
